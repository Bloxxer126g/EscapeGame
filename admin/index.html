<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js"
      }
    }
    </script>
    <script src="admin.js" defer type="module"></script>
    <title>The Puzzle Box — Admin</title>
    <style>
        #SrcModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        #SrcModal.open { display: flex; }
        #SrcBox {
            background: white;
            padding: 24px;
            border-radius: 8px;
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #SrcBox textarea {
            width: 100%;
            height: 120px;
            font-family: monospace;
            font-size: 13px;
        }
        #SrcBox .row { display: flex; gap: 8px; justify-content: flex-end; }
        #ResponseImage {
            display: none;
            max-width: 300px;
            max-height: 300px;
            object-fit: contain;
            margin-top: 8px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Admin</h1>
    <input type="text" id="MessageInput" placeholder="Content...">
    <div id="QuickButtons">
        <button class="quick">HINT</button>
        <button class="quick">ERROR</button>
        <button class="quick">CORRECT</button>
        <button class="quick">INPUT</button>
        <button class="quick">NOTICE</button>
        <button id="PictureBtn">PICTURE</button>
    </div>
    <h2>Last response: <span id="ResponseLabel">...</span></h2>
    <img id="ResponseImage" alt="Player's choice">

    <div id="SrcModal">
        <div id="SrcBox">
            <h3 style="margin:0">Image SRCs</h3>
            <p style="margin:0; font-size:13px;">Enter one image URL per line.</p>
            <textarea id="SrcInput" placeholder="https://example.com/image1.jpg&#10;https://example.com/image2.jpg"></textarea>
            <div class="row">
                <button id="SrcCancel">Cancel</button>
                <button id="SrcSend">Send to Player</button>
            </div>
        </div>
    </div>
</body>
</html>
