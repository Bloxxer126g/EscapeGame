<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js"
      }
    }
    </script>
    <script src="player.js" defer type="module"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@1&display=swap" rel="stylesheet"> 
    <title>The Puzzle Box</title>
    <style>
        #ImageView {
            display: none;
            position: fixed;
            inset: 0;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 32px;
        }
        #ImageView img {
            max-width: 300px;
            max-height: 300px;
            object-fit: contain;
            cursor: pointer;
            border: 3px solid transparent;
            border-radius: 8px;
            transition: border-color 0.15s;
        }
        #ImageView img:hover {
            border-color: #fff;
        }
    </style>
</head>
<body>
    <div id="WaitingView">
        <h1 id="ContentLabel">Awaiting Request</h1>
    </div>

    <div id="ResponseView" style="display:none; position:fixed; inset:0; flex-direction:column; justify-content:center; align-items:center;">
        <h2 class="Text"><span class="Text" id="PopupAction"></span></h2>
        <p id="PopupContent"></p>
        <input class="Text" id="ResponseInput" type="text">
        <br>
        <button class="Text" id="ResponseSend">Send</button>
    </div>

    <div id="ImageView"></div>
</body>
</html>
